# Minimal E2E harness scaffold (Playwright image + app)
services:
  finally:
    build: ..
    environment:
      - LLM_MOCK=true
      - DB_PATH=/app/db/finally.db
    ports:
      - "8000:8000"
    volumes:
      - finally-test-data:/app/db

  playwright:
    image: mcr.microsoft.com/playwright:v1.49.0-jammy
    depends_on:
      - finally
    working_dir: /tests
    volumes:
      - ./e2e:/tests
    environment:
      - BASE_URL=http://finally:8000
    command: ["npx", "playwright", "test", "--reporter=line"]

volumes:
  finally-test-data:
